services:
  db:
    image: postgres:16
    container_name: recipe_app_db
    environment:
      POSTGRES_USER: recipe_app
      POSTGRES_PASSWORD: recipe_app_password
      POSTGRES_DB: recipe_app_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: recipe_app_backend
    command: bin/rails server -b 0.0.0.0
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      DATABASE_USERNAME: recipe_app
      DATABASE_PASSWORD: recipe_app_password
      DATABASE_NAME: recipe_app_development
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      - db

volumes:
  postgres_data:
  bundle_cache:
